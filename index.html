<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
        <link rel="stylesheet" href="css/leaflet.css">
        <link rel="stylesheet" href="css/L.Control.Layers.Tree.css">
        <link rel="stylesheet" href="css/qgis2web.css">
        <link rel="stylesheet" href="css/fontawesome-all.min.css">
        <link rel="stylesheet" href="css/leaflet-search.css">
        <style>
        html, body {
            width: 100%;
            height: 100%;
            padding: 0;
            margin: 0;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
        }
        #title-header {
            background-color: #2c3e50;
            color: white;
            text-align: center;
            padding: 15px 0;
            margin: 0;
            z-index: 1000;
        }
        /* Layout Utama */
        #main-container {
            display: flex;
            flex-direction: row;
            flex-grow: 1;
            overflow: hidden;
        }
        /* Tab Carian di Sisi */
        #search-tab {
            width: 300px;
            background: #f8f9fa;
            border-right: 2px solid #ddd;
            padding: 15px;
            display: flex;
            flex-direction: column;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
            z-index: 1001;
        }
        #map {
            flex-grow: 1;
            height: 100%;
        }
        /* Styling Input Carian */
        .search-container { margin-bottom: 20px; }
        .search-input { 
            width: 100%; 
            padding: 10px; 
            border: 1px solid #ccc; 
            border-radius: 4px;
        }
        /* Maklumat Lot di Tab */
        #info-panel {
            margin-top: 20px;
            padding: 10px;
            background: white;
            border-radius: 5px;
            border: 1px solid #eee;
            display: none; /* Sembunyi jika tiada hasil */
        }
        #info-panel h3 { margin-top: 0; color: #2980b9; font-size: 16px; }
        .info-row { margin-bottom: 8px; font-size: 14px; border-bottom: 1px solid #f0f0f0; padding-bottom: 5px; }
        .info-label { font-weight: bold; color: #555; }
        </style>
        <title>SISTEM CARIAN LOT</title>
    </head>
    <body>
        <h1 id="title-header">PENGURUSAN TAMAN PERUMAHAN</h1>

        <div id="main-container">
            <div id="search-tab">
                <div class="search-container">
                    <label style="font-weight: bold;">Carian No. Lot:</label>
                    <div id="search-box" style="margin-top:10px;"></div>
                </div>

                <div id="info-panel">
                    <h3>Maklumat Lot</h3>
                    <div id="lot-details">
                        </div>
                </div>
            </div>

            <div id="map"></div>
        </div>
        
        <script src="js/qgis2web_expressions.js"></script>
        <script src="js/leaflet.js"></script>
        <script src="js/L.Control.Layers.Tree.min.js"></script>
        <script src="js/leaflet-hash.js"></script>
        <script src="js/Autolinker.min.js"></script>
        <script src="js/rbush.min.js"></script>
        <script src="js/labelgun.min.js"></script>
        <script src="js/labels.js"></script>
        <script src="js/leaflet-search.js"></script>
        
        <script src="data/POLYGONIZEE_1.js"></script>
        <script src="data/LOTFINAL_2.js"></script>
        <script src="data/TANDASEMPADAN_3.js"></script>

        <script>
        var map = L.map('map', {
            zoomControl:true, maxZoom:28, minZoom:1
        }).fitBounds([[2.1022779341308064,102.52037699699693],[2.1050033227290808,102.52490225827017]]);

        L.tileLayer('https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', {
            opacity: 1.0,
            maxZoom: 28
        }).addTo(map);

        // Layer LOTFINAL_2
        var layer_LOTFINAL_2 = new L.geoJson(json_LOTFINAL_2, {
            style: {
                color: 'rgba(35,35,35,1.0)',
                weight: 1.0,
                fillColor: 'rgba(152,125,183,1.0)',
                fillOpacity: 0.6,
            }
        }).addTo(map);

        // --- KONFIGURASI CARIAN DI TAB ---
        var searchControl = new L.Control.Search({
            layer: layer_LOTFINAL_2,
            propertyName: 'NO_LOT',
            container: 'search-box', // KUNCI UTAMA: Masukkan ke dalam div search-box
            collapsed: false,
            initial: false,
            zoom: 19,
            marker: false,
            moveToLocation: function(latlng, title, map) {
                // Zoom ke lot secara spesifik mengikut saiz lot
                var bounds = latlng.layer.getBounds();
                map.fitBounds(bounds, {padding: [50, 50]});
            }
        });

        // --- APABILA LOT DIJUMPAI ---
        searchControl.on('search:locationfound', function(e) {
            // 1. Highlight Lot
            if(this._markerSearch) {
                this._markerSearch.setLatLng(e.latlng);
            }
            
            // 2. Papar maklumat di PANEL SISI (Tab)
            var props = e.layer.feature.properties;
            var infoDiv = document.getElementById('lot-details');
            var panel = document.getElementById('info-panel');
            
            panel.style.display = 'block'; // Tunjukkan panel
            
            infoDiv.innerHTML = `
                <div class="info-row"><span class="info-label">FID:</span> ${props.FID || '-'}</div>
                <div class="info-row"><span class="info-label">NO LOT:</span> ${props.NO_LOT || '-'}</div>
                <div class="info-row"><span class="info-label">KELUASAN:</span> ${props.AREA || '-'}</div>
            `;

            // 3. Buka popup pada peta juga jika mahu
            e.layer.bindPopup("No Lot: " + props.NO_LOT).openPopup();
        });

        map.addControl(searchControl);

        // Kemaskini label
        resetLabels([layer_LOTFINAL_2]);
        map.on("zoomend", function(){ resetLabels([layer_LOTFINAL_2]); });
        </script>
    </body>
</html>
