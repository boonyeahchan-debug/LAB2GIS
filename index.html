<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
        <meta name="mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-capable" content="yes">
        
        <link rel="icon" type="image/png" href="GAMBAR.PNG">
        
        <link rel="stylesheet" href="css/leaflet.css">
        <link rel="stylesheet" href="css/L.Control.Layers.Tree.css">
        <link rel="stylesheet" href="css/qgis2web.css">
        <link rel="stylesheet" href="css/fontawesome-all.min.css">
        <link rel="stylesheet" href="css/leaflet-search.css">
        <link rel="stylesheet" href="css/leaflet.photon.css">
        <style>
        html, body {
            width: 100%;
            height: 100%;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            font-family: Arial, sans-serif;
        }
        
        #title-header {
            background-color: #ffffff;
            color: #333;
            text-align: center;
            padding: 10px 0;
            margin: 0;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            z-index: 1000;
        }

        #main-container {
            display: flex;
            flex-direction: row;
            flex-grow: 1;
            overflow: hidden;
        }

        #sidebar {
            width: 300px;
            background: #f8f9fa;
            border-right: 1px solid #ccc;
            padding: 15px;
            overflow-y: auto;
            box-shadow: 2px 0 5px rgba(0,0,0,0.05);
        }

        #map {
            flex-grow: 1;
            height: 100%;
        }

        .search-container {
            margin-bottom: 20px;
        }

        select {
            width: 100%;
            padding: 8px;
            border-radius: 4px;
            border: 1px solid #ddd;
        }

        .info-box {
            background: white;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #eee;
            margin-top: 10px;
        }

        .info-box h3 {
            margin-top: 0;
            font-size: 16px;
            color: #d63384;
            border-bottom: 2px solid #eee;
            padding-bottom: 5px;
        }

        .info-table {
            width: 100%;
            font-size: 13px;
        }

        .info-table tr td {
            padding: 5px 0;
        }

        .info-table tr td:first-child {
            font-weight: bold;
            color: #666;
        }

        /* --- GAYA LABEL TERAPUNG (TIADA KOTAK) --- */
        .leaflet-tooltip.lot-label {
            background-color: transparent !important;
            border: none !important;
            box-shadow: none !important;
            color: #000; 
            font-weight: bold;
            font-size: 12px;
            text-align: center;
            text-shadow: 2px 2px 4px #fff, -2px -2px 4px #fff, 2px -2px 4px #fff, -2px 2px 4px #fff; 
        }
        </style>
        <title>TAMAN PERUMAHAN</title>
    </head>
    <body>
        <h1 id="title-header">TAMAN PERUMAHAN</h1>

        <div id="main-container">
            <div id="sidebar">
                <div class="search-container">
                    <label style="font-weight: bold; display: block; margin-bottom: 8px;">Cari No. Lot:</label>
                    <select id="lotSearchSelect" onchange="zoomToLot(this.value)">
                        <option value="">-- Pilih No Lot --</option>
                    </select>
                </div>

                <div id="lotInfo" class="info-box" style="display:none;">
                    <h3>MAKLUMAT</h3>
                    <div id="detailsContent"></div>
                </div>
            </div>

            <div id="map"></div>
        </div>
        
        <script src="js/qgis2web_expressions.js"></script>
        <script src="js/leaflet.js"></script>
        <script src="js/L.Control.Layers.Tree.min.js"></script>
        <script src="js/leaflet.rotatedMarker.js"></script>
        <script src="js/leaflet.pattern.js"></script>
        <script src="js/leaflet-hash.js"></script>
        <script src="js/Autolinker.min.js"></script>
        <script src="js/rbush.min.js"></script>
        <script src="js/labelgun.min.js"></script>
        <script src="js/labels.js"></script>
        <script src="js/leaflet.photon.js"></script>
        <script src="js/leaflet-search.js"></script>
        <script src="data/POLYGONIZEE_1.js"></script>
        <script src="data/LOTFINAL_2.js"></script>
        <script src="data/TANDASEMPADAN_3.js"></script>
        <script>
        var map = L.map('map', {
            zoomControl:false, maxZoom:28, minZoom:1
        }).fitBounds([[2.1022779341308064,102.52037699699693],[2.1050033227290808,102.52490225827017]]);
        
        var hash = new L.Hash(map);
        
        var zoomControl = L.control.zoom({
            position: 'topleft'
        }).addTo(map);

        map.createPane('pane_GoogleSatellite_0');
        map.getPane('pane_GoogleSatellite_0').style.zIndex = 400;
        var layer_GoogleSatellite_0 = L.tileLayer('https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', {
            pane: 'pane_GoogleSatellite_0',
            opacity: 1.0,
            attribution: 'Map data ©2015 Google',
            minZoom: 1,
            maxZoom: 28,
        });
        map.addLayer(layer_GoogleSatellite_0);

        // LAYER LOTFINAL
        function style_LOTFINAL_2_0() {
            return {
                pane: 'pane_LOTFINAL_2',
                opacity: 1,
                color: 'rgba(35,35,35,1.0)',
                fill: true,
                fillOpacity: 0.4,
                fillColor: 'rgba(152,125,183,1.0)',
                interactive: true,
            }
        }
        map.createPane('pane_LOTFINAL_2');
        map.getPane('pane_LOTFINAL_2').style.zIndex = 402;
        
        var layer_LOTFINAL_2 = new L.geoJson(json_LOTFINAL_2, {
            pane: 'pane_LOTFINAL_2',
            style: style_LOTFINAL_2_0,
            onEachFeature: function(feature, layer) {
                // LABEL TERAPUNG (HANYA NO LOT SUPAYA KEMAS)
                var lotLabel = feature.properties['NO_LOT'] || '';
                layer.bindTooltip(lotLabel, {
                    permanent: true, 
                    direction: 'center', 
                    className: 'lot-label'
                }).openTooltip();

                // ISI DROPDOWN
                var select = document.getElementById('lotSearchSelect');
                var option = document.createElement('option');
                option.value = feature.properties['NO_LOT'];
                option.text = "Lot " + feature.properties['NO_LOT'];
                select.appendChild(option);

                layer.on({
                    click: function(e) {
                        displayLotInfo(feature.properties);
                    }
                });
            }
        });
        map.addLayer(layer_LOTFINAL_2);

        // FUNGSI PAPAR MAKLUMAT (LABEL DAERAH & PEMILIK)
        function displayLotInfo(props) {
            var infoDiv = document.getElementById('lotInfo');
            var content = document.getElementById('detailsContent');
            infoDiv.style.display = 'block';

            var html = '<table class="info-table">';
            html += '<tr><td>NO LOT</td><td>: ' + (props['NO_LOT'] || '-') + '</td></tr>';
            html += '<tr><td>KELUASAN</td><td>: ' + (props['AREA'] || '-') + '</td></tr>';
            html += '<tr><td>DAERAH</td><td>: ' + (props['DAERAH'] || '-') + '</td></tr>';
            html += '<tr><td>PEMILIK</td><td>: ' + (props['PEMILIK'] || '-') + '</td></tr>';
            html += '</table>';
            
            content.innerHTML = html;
        }

        function zoomToLot(lotNo) {
            if (!lotNo) return;
            layer_LOTFINAL_2.eachLayer(function(layer) {
                if (layer.feature.properties['NO_LOT'] == lotNo) {
                    map.fitBounds(layer.getBounds(), {padding: [50, 50]});
                    displayLotInfo(layer.feature.properties);
                }
            });
        }
        </script>        
    </body>
</html>
