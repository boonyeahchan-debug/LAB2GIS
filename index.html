<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
        <title>SISTEM PENGURUSAN LOT JKA</title>
        
        <link rel="stylesheet" href="css/leaflet.css">
        <link rel="stylesheet" href="css/qgis2web.css">
        <link rel="stylesheet" href="css/fontawesome-all.min.css">
        
        <style>
            html, body { width: 100%; height: 100%; padding: 0; margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; overflow: hidden; }
            
            /* --- LOGIN SECTION --- */
            #login-screen {
                position: fixed; top: 0; left: 0; width: 100%; height: 100%;
                background: #2c3e50; display: flex; justify-content: center; align-items: center; z-index: 10000;
            }
            .login-box { background: white; padding: 30px; border-radius: 12px; width: 300px; text-align: center; box-shadow: 0 8px 20px rgba(0,0,0,0.4); }
            .login-box input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
            .login-box button { width: 100%; padding: 12px; background: #e74c3c; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 10px; }

            /* --- LAYOUT SECTION --- */
            #app-header { background: #ecf0f1; padding: 10px 20px; border-bottom: 3px solid #e74c3c; display: none; }
            #main-container { display: none; flex: 1; overflow: hidden; }
            
            #sidebar { width: 320px; background: #fdfdfd; border-right: 1px solid #ccc; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; }
            #map { flex: 1; height: 100%; }

            /* --- UI ELEMENTS --- */
            .info-card { background: #fff; border: 1px solid #eee; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); margin-top: 20px; }
            .info-table { width: 100%; font-size: 13px; border-collapse: collapse; }
            .info-table td { padding: 8px 4px; border-bottom: 1px solid #f1f1f1; }
            .td-label { font-weight: bold; color: #7f8c8d; width: 35%; }

            .lot-label {
                background: rgba(255, 255, 255, 0.85);
                border: 1px solid #e74c3c;
                border-radius: 3px;
                padding: 1px 4px;
                font-size: 10px;
                font-weight: bold;
                color: #333;
                text-align: center;
            }

            select { width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #ccc; margin-top: 5px; cursor: pointer; }
        </style>
    </head>
    <body>

        <div id="login-screen">
            <div class="login-box">
                <h2 style="color:#2c3e50; margin-bottom:20px;">GIS-LOT LOGIN</h2>
                <input type="text" id="username" placeholder="Username">
                <input type="password" id="password" placeholder="Password">
                <button onclick="checkAuth()">MASUK SISTEM</button>
            </div>
        </div>

        <header id="app-header">
            <h3 style="margin:0; color:#2c3e50;">SISTEM PENGURUSAN LOT TANAH (JKA PUO)</h3>
        </header>

        <div id="main-container">
            <aside id="sidebar">
                <div style="text-align:center; margin-bottom:15px;">
                    <img src="poli logo.png" style="width:70px;" onerror="this.style.display='none'">
                </div>

                <label style="font-weight:bold; font-size:14px;">Cari No Lot:</label>
                <select id="lotSearch" onchange="focusToLot(this.value)">
                    <option value="">-- Pilih No Lot --</option>
                </select>

                <div id="infoPanel" class="info-card" style="display:none;">
                    <h4 style="margin:0 0 10px 0; color:#e74c3c; border-bottom:2px solid #eee; padding-bottom:5px;">MAKLUMAT LOT</h4>
                    <div id="details"></div>
                </div>
            </aside>

            <div id="map"></div>
        </div>

        <script src="js/leaflet.js"></script>
        <script src="data/LOTFINAL_2.js"></script>
        <script src="data/TANDASEMPADAN_3.js"></script>

        <script>
            var map;
            var lotLayer;

            // 1. Fungsi Login
            function checkAuth() {
                var u = document.getElementById('username').value;
                var p = document.getElementById('password').value;
                if(u === "admin" && p === "1234") {
                    document.getElementById('login-screen').style.display = 'none';
                    document.getElementById('app-header').style.display = 'block';
                    document.getElementById('main-container').style.display = 'flex';
                    initApp();
                } else {
                    alert("ID atau Kata Laluan Salah!");
                }
            }

            // 2. Inisialisasi Peta & Data
            function initApp() {
                map = L.map('map').setView([2.1036, 102.5226], 18);
                
                // Base Layer (Satelit)
                L.tileLayer('https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', {
                    maxZoom: 22,
                    attribution: 'Google Hybrid'
                }).addTo(map);

                // Load Data Lot
                lotLayer = L.geoJson(json_LOTFINAL_2, {
                    style: function(feature) {
                        return { color: '#000', weight: 1.5, fillColor: '#3498db', fillOpacity: 0.3 };
                    },
                    onEachFeature: function(feature, layer) {
                        var p = feature.properties;
                        
                        // Menangani variasi nama kolum (case-insensitive)
                        var noLot = p['NO_LOT'] || p['no_lot'] || p['Lot'] || 'N/A';
                        var pemilik = p['tsp — pe'] || p['PEMILIK'] || p['Pemilik'] || 'TIADA NAMA';
                        var daerah = p['tsp — ha'] || p['DAERAH'] || p['Daerah'] || '-';

                        // A. Masukkan ke Dropdown Search
                        var dropdown = document.getElementById('lotSearch');
                        var opt = document.createElement('option');
                        opt.value = noLot;
                        opt.innerHTML = "Lot " + noLot + " (" + pemilik + ")";
                        dropdown.appendChild(opt);

                        // B. Tambah Label pada Peta
                        layer.bindTooltip("Lot " + noLot, {
                            permanent: true, direction: 'center', className: 'lot-label'
                        });

                        // C. Fungsi Klik
                        layer.on('click', function(e) {
                            showSidebar(p, noLot, pemilik, daerah);
                            map.fitBounds(layer.getBounds());
                            
                            // Highlight Lot yang dipilih
                            lotLayer.setStyle({ color: '#000', weight: 1.5, fillOpacity: 0.3 });
                            layer.setStyle({ color: 'yellow', weight: 3, fillOpacity: 0.5 });
                        });
                    }
                }).addTo(map);

                if (json_LOTFINAL_2) map.fitBounds(lotLayer.getBounds());
            }

            // 3. Zoom ke Lot dari Dropdown
            function focusToLot(val) {
                if(!val) return;
                lotLayer.eachLayer(function(l) {
                    var checkVal = l.feature.properties['NO_LOT'] || l.feature.properties['no_lot'] || l.feature.properties['Lot'];
                    if(checkVal == val) {
                        l.fire('click');
                    }
                });
            }

            // 4. Papar Maklumat di Sidebar
            function showSidebar(p, no, nama, daerah) {
                var panel = document.getElementById('infoPanel');
                var details = document.getElementById('details');
                panel.style.display = 'block';

                details.innerHTML = `
                    <table class="info-table">
                        <tr><td class="td-label">NO LOT</td><td>: ${no}</td></tr>
                        <tr><td class="td-label">PEMILIK</td><td>: ${nama}</td></tr>
                        <tr><td class="td-label">DAERAH</td><td>: ${daerah}</td></tr>
                        <tr><td class="td-label">LUAS</td><td>: ${p['AREA'] || p['Area'] || '-'} m²</td></tr>
                        <tr><td class="td-label">UTARA</td><td>: ${p['Y'] || '-'}</td></tr>
                        <tr><td class="td-label">TIMUR</td><td>: ${p['X'] || '-'}</td></tr>
                    </table>
                `;
            }
        </script>
    </body>
</html>
