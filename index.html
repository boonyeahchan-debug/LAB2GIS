<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
        <meta name="mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <link rel="stylesheet" href="css/leaflet.css">
        <link rel="stylesheet" href="css/L.Control.Layers.Tree.css">
        <link rel="stylesheet" href="css/qgis2web.css">
        <link rel="stylesheet" href="css/fontawesome-all.min.css">
        <link rel="stylesheet" href="css/leaflet-search.css">
        <link rel="stylesheet" href="css/leaflet.photon.css">
        <style>
        /* Tetapan Layout Utama */
        html, body {
            width: 100%;
            height: 100%;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            font-family: Arial, sans-serif;
        }
        
        #title-header {
            background-color: #ffffff;
            color: #333;
            text-align: center;
            padding: 10px 0;
            margin: 0;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            z-index: 1000;
        }

        #map {
            width: 100%;
            flex-grow: 1;
            z-index: 1;
        }

        /* Gaya Overlay Log Masuk */
        #login-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
        }
        .login-box {
            background: white;
            padding: 40px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            width: 300px;
        }
        .login-box h2 { margin-bottom: 20px; color: #225989; }
        .login-box input {
            display: block;
            margin: 10px auto;
            padding: 12px;
            width: 90%;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        .login-box button {
            width: 100%;
            padding: 12px;
            background: #225989;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
            font-weight: bold;
            margin-top: 10px;
        }
        .login-box button:hover { background: #1a446a; }
        #login-error { color: red; font-size: 14px; margin-top: 10px; display: none; }
        </style>
        <title>TAMAN PERUMAHAN</title>
    </head>
    <body>
        <div id="login-overlay">
            <div class="login-box">
                <h2>LOG MASUK SISTEM</h2>
                <input type="text" id="userid" placeholder="ID Pengguna (admin)">
                <input type="password" id="password" placeholder="Kata Laluan (1234)">
                <button onclick="checkLogin()">MASUK</button>
                <p id="login-error">ID atau Kata Laluan Salah!</p>
            </div>
        </div>

        <h1 id="title-header">SISTEM MAKLUMAT TAMAN PERUMAHAN</h1>

        <div id="map"></div>
        
        <script src="js/qgis2web_expressions.js"></script>
        <script src="js/leaflet.js"></script>
        <script src="js/L.Control.Layers.Tree.min.js"></script>
        <script src="js/leaflet.rotatedMarker.js"></script>
        <script src="js/leaflet.pattern.js"></script>
        <script src="js/leaflet-hash.js"></script>
        <script src="js/Autolinker.min.js"></script>
        <script src="js/rbush.min.js"></script>
        <script src="js/labelgun.min.js"></script>
        <script src="js/labels.js"></script>
        <script src="js/leaflet.photon.js"></script>
        <script src="js/leaflet-search.js"></script>
        <script src="data/POLYGONIZEE_1.js"></script>
        <script src="data/LOTFINAL_2.js"></script>
        <script src="data/TANDASEMPADAN_3.js"></script>

        <script>
        // --- FUNGSI LOG MASUK ---
        function checkLogin() {
            var id = document.getElementById('userid').value;
            var pass = document.getElementById('password').value;
            
            // ID: admin | PASS: 1234 (Boleh diubah mengikut keperluan)
            if(id === "admin" && pass === "1234") {
                document.getElementById('login-overlay').style.display = 'none';
            } else {
                document.getElementById('login-error').style.display = 'block';
            }
        }

        var highlightLayer;
        function highlightFeature(e) {
            highlightLayer = e.target;
            highlightLayer.openPopup();
        }

        var map = L.map('map', {
            zoomControl:false, maxZoom:28, minZoom:1
        }).fitBounds([[2.1022779341308064,102.52037699699693],[2.1050033227290808,102.52490225827017]]);
        
        var hash = new L.Hash(map);
        map.attributionControl.setPrefix('<a href="https://github.com/tomchadwin/qgis2web" target="_blank">qgis2web</a>');
        var autolinker = new Autolinker({truncate: {length: 30, location: 'smart'}});
        
        // --- PENGURUSAN POPUP ---
        function removeEmptyRowsFromPopupContent(content, feature) {
            var tempDiv = document.createElement('div');
            tempDiv.innerHTML = content;
            var rows = tempDiv.querySelectorAll('tr');
            for (var i = 0; i < rows.length; i++) {
                var td = rows[i].querySelector('td.visible-with-data');
                var key = td ? td.id : '';
                if (td && td.classList.contains('visible-with-data') && feature.properties[key] == null) {
                    rows[i].parentNode.removeChild(rows[i]);
                }
            }
            return tempDiv.innerHTML;
        }

        // --- BASEMAP ---
        map.createPane('pane_GoogleSatellite_0');
        map.getPane('pane_GoogleSatellite_0').style.zIndex = 400;
        var layer_GoogleSatellite_0 = L.tileLayer('https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', {
            pane: 'pane_GoogleSatellite_0',
            opacity: 1.0,
            minZoom: 1,
            maxZoom: 28,
        });
        map.addLayer(layer_GoogleSatellite_0);

        // --- LAYER LOT DAN SEARCH INDEX ---
        function pop_LOTFINAL_2(feature, layer) {
            layer.on({
                mouseout: function(e) { if (typeof layer.closePopup == 'function') { layer.closePopup(); } },
                mouseover: highlightFeature,
            });

            // MENCIPTA INDEX CARIAN (Daerah, Pemilik, No Lot, Keluasan)
            // Sila pastikan nama property (DAERAH, PEMILIK, NO_LOT, AREA) wujud dalam data anda
            feature.properties['search_index'] = 
                (feature.properties['DAERAH'] || '') + " " + 
                (feature.properties['PEMILIK'] || '') + " " + 
                (feature.properties['NO_LOT'] || '') + " " + 
                (feature.properties['AREA'] || '');

            var popupContent = '<table class="popup-table">\
                    <tr><th scope="row">DAERAH</th><td>' + (feature.properties['DAERAH'] || '-') + '</td></tr>\
                    <tr><th scope="row">PEMILIK</th><td>' + (feature.properties['PEMILIK'] || '-') + '</td></tr>\
                    <tr><th scope="row">NO LOT</th><td>' + (feature.properties['NO_LOT'] || '-') + '</td></tr>\
                    <tr><th scope="row">KELUASAN</th><td>' + (feature.properties['AREA'] || '-') + '</td></tr>\
                </table>';
            layer.bindPopup(popupContent, { maxHeight: 400 });
        }

        var layer_LOTFINAL_2 = new L.geoJson(json_LOTFINAL_2, {
            pane: 'pane_LOTFINAL_2',
            onEachFeature: pop_LOTFINAL_2,
            style: {
                color: 'rgba(35,35,35,1.0)',
                fillColor: 'rgba(152,125,183,1.0)',
                fillOpacity: 0.7,
                weight: 1.5
            }
        });
        map.addLayer(layer_LOTFINAL_2);

        // --- SISTEM CARIAN (SEARCH TAB) ---
        var searchControl = new L.Control.Search({
            layer: layer_LOTFINAL_2,
            initial: false,
            hideMarkerOnCollapse: true,
            propertyName: 'search_index', // Merujuk kepada gabungan maklumat tadi
            textPlaceholder: 'Cari Daerah/Pemilik/Lot/Keluasan...',
            moveToLocation: function(latlng, title, map) {
                map.setView(latlng, 19); 
            }
        });
        map.addControl(searchControl);

        // Tambah Zoom Control
        L.control.zoom({ position: 'topleft' }).addTo(map);

        // Icon Binoculars
        document.querySelector('.search-button').className += ' fa fa-binoculars';

        </script>        
    </body>
</html>
