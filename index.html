<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
    <title>SISTEM PENGURUSAN LOT | JKA PUO</title>

    <link rel="stylesheet" href="css/leaflet.css">
    <link rel="stylesheet" href="css/L.Control.Layers.Tree.css">
    <link rel="stylesheet" href="css/qgis2web.css">
    <link rel="stylesheet" href="css/fontawesome-all.min.css">
    <link rel="stylesheet" href="css/leaflet-search.css">
    
    <style>
        /* 1. GLOBAL STYLES */
        :root {
            --primary-color: #1a2a6c;
            --accent-color: #d63384;
            --sidebar-width: 340px;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f4f7f6;
        }

        /* 2. LOGIN OVERLAY */
        #login-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #1a2a6c, #b21f1f, #fdbb2d);
            display: flex; justify-content: center; align-items: center;
            z-index: 9999; transition: 0.5s;
        }

        .login-box {
            background: white; padding: 40px; border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 350px; text-align: center;
        }

        .login-box img { width: 120px; margin-bottom: 20px; }
        .login-box input {
            width: 100%; padding: 12px; margin: 10px 0;
            border: 1px solid #ddd; border-radius: 5px;
        }

        .login-box button {
            width: 100%; padding: 12px; background: var(--primary-color);
            color: white; border: none; border-radius: 5px; cursor: pointer;
            font-weight: bold; margin-top: 10px;
        }

        /* 3. APP LAYOUT */
        #app-container { display: none; flex-direction: column; height: 100vh; }
        
        header {
            background: white; padding: 10px 20px; 
            border-bottom: 3px solid var(--accent-color);
            display: flex; justify-content: space-between; align-items: center;
        }

        .main-wrapper { display: flex; flex-grow: 1; overflow: hidden; }

        /* 4. SIDEBAR STYLING */
        #sidebar {
            width: var(--sidebar-width); background: white;
            border-right: 1px solid #ddd; overflow-y: auto;
            display: flex; flex-direction: column; padding: 20px;
        }

        .sidebar-header { text-align: center; margin-bottom: 20px; }
        .sidebar-header h3 { font-size: 14px; margin: 5px 0; color: var(--primary-color); }
        
        .control-group { 
            background: #f9f9f9; padding: 15px; border-radius: 8px; 
            margin-bottom: 15px; border: 1px solid #eee;
        }

        .control-label { font-weight: bold; font-size: 12px; color: #666; display: block; margin-bottom: 8px; }

        /* 5. MAP AREA */
        #map { flex-grow: 1; height: 100%; }

        /* 6. UTILITY CLASSES */
        .info-table { width: 100%; font-size: 13px; border-collapse: collapse; }
        .info-table td { padding: 8px; border-bottom: 1px solid #eee; }
        .label-bold { font-weight: bold; color: #444; width: 40%; }
        
        .success-msg { color: green; font-size: 12px; margin-bottom: 10px; }
        .error-msg { color: red; font-size: 12px; display: none; }
        
        /* Custom Tooltip Styling */
        .custom-lot-label {
            background: transparent !important; border: none !important;
            box-shadow: none !important; font-weight: 800; text-align: center;
        }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <img src="poli logo.png" alt="PUO Logo">
            <h2 style="margin:0;">SISTEM MAKLUMAT TANAH</h2>
            <p style="font-size:12px; color:#666; margin-bottom:20px;">Jabatan Kejuruteraan Awam</p>
            
            <div id="login-form">
                <input type="text" id="u_id" placeholder="ID Pengguna (e.g. USER01)">
                <input type="password" id="u_pw" placeholder="Kata Laluan">
                <button onclick="handleLogin()">LOG MASUK</button>
                <p id="err-login" class="error-msg">ID atau Kata Laluan Salah!</p>
                <p onclick="toggleReset(true)" style="font-size:11px; color:blue; cursor:pointer; margin-top:10px;">Lupa Kata Laluan?</p>
            </div>

            <div id="reset-form" style="display:none;">
                <h4 style="margin:0;">Reset Kata Laluan</h4>
                <input type="text" id="reset_id" placeholder="Masukkan ID Anda">
                <input type="password" id="new_pw" placeholder="Kata Laluan Baru">
                <button onclick="handleReset()">SAHKAN RESET</button>
                <button onclick="toggleReset(false)" style="background:#888;">BATAL</button>
            </div>
        </div>
    </div>

    <div id="app-container">
        <header>
            <div style="display:flex; align-items:center;">
                <img src="poli logo.png" width="40" style="margin-right:10px;">
                <h2 style="font-size:18px; margin:0;">PUO GIS-LOT SYSTEM</h2>
            </div>
            <div id="user-display" style="font-size:14px; font-weight:bold; color:var(--accent-color);"></div>
        </header>

        <div class="main-wrapper">
            <aside id="sidebar">
                <div class="sidebar-header">
                    <p style="font-weight:bold; margin:0;">POLITEKNIK UNGKU OMAR</p>
                    <p style="font-style:italic; font-size:11px; margin:0;">Jabatan Kejuruteraan Awam</p>
                    <hr>
                </div>

                <div class="control-group">
                    <span class="control-label">CONVERTER KOORDINAT</span>
                    <input type="number" id="latInput" placeholder="Latitude (DD)" style="width:90%; padding:5px; margin-bottom:5px;">
                    <button onclick="convertCoords()" style="width:100%; padding:5px; font-size:11px;">Tukar ke DMS</button>
                    <div id="dmsResult" style="font-size:11px; margin-top:5px; color:var(--primary-color);"></div>
                </div>

                <div class="control-group">
                    <span class="control-label">KAWALAN LAPISAN</span>
                    <label style="font-size:13px;"><input type="checkbox" id="checkSat" checked onchange="toggleBasemap()"> Peta Satelit (Google)</label><br>
                    <label style="font-size:13px;"><input type="checkbox" id="checkLabel" checked onchange="toggleLabels()"> Papar Label Lot</label>
                </div>

                <div class="control-group">
                    <span class="control-label">TETAPAN VISUAL</span>
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:5px;">
                        <span style="font-size:11px;">Warna Sempadan:</span>
                        <input type="color" id="colorBorder" value="#FF0000" onchange="updateStyles()">
                    </div>
                    <span style="font-size:11px;">Ketebalan Garisan:</span>
                    <input type="range" id="widthLine" min="1" max="10" value="3" style="width:100%" onchange="updateStyles()">
                </div>

                <div class="control-group" id="infoPanel" style="display:none; border-left: 4px solid var(--accent-color);">
                    <span class="control-label" style="color:var(--accent-color);">MAKLUMAT LOT</span>
                    <div id="infoContent"></div>
                </div>

                <div style="margin-top:auto;">
                    <button onclick="location.reload()" style="width:100%; background:none; border:1px solid #ccc; padding:10px; border-radius:5px; cursor:pointer;">Log Keluar</button>
                </div>
            </aside>

            <main id="map"></main>
        </div>
    </div>

    <script src="js/qgis2web_expressions.js"></script>
    <script src="js/leaflet.js"></script>
    <script src="js/L.Control.Layers.Tree.min.js"></script>
    <script src="js/leaflet-search.js"></script>
    
    <script src="data/LOTFINAL_2.js"></script>
    <script src="data/TANDASEMPADAN_3.js"></script>

    <script>
        // --- 1. DATABASE & STATE ---
        const USER_DATABASE = {
            "USER01": "Chan Boon Yeah",
            "USER02": "Wong Yuean Yi",
            "USER03": "Ooi Sue Ann",
            "admin": "Admin JKA"
        };
        
        let PASSWORDS = { "USER01": "admin123", "USER02": "admin123", "USER03": "admin123", "admin": "1234" };
        let map, layer_LOTFINAL_2, googleSat, osm;

        // --- 2. AUTHENTICATION LOGIC ---
        function handleLogin() {
            const id = document.getElementById('u_id').value;
            const pw = document.getElementById('u_pw').value;

            if (USER_DATABASE[id] && PASSWORDS[id] === pw) {
                document.getElementById('login-screen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('login-screen').style.display = 'none';
                    document.getElementById('app-container').style.display = 'flex';
                    document.getElementById('user-display').innerText = "👤 " + USER_DATABASE[id];
                    initMap();
                }, 500);
            } else {
                document.getElementById('err-login').style.display = 'block';
            }
        }

        function toggleReset(show) {
            document.getElementById('login-form').style.display = show ? 'none' : 'block';
            document.getElementById('reset-form').style.display = show ? 'block' : 'none';
        }

        function handleReset() {
            const id = document.getElementById('reset_id').value;
            const npw = document.getElementById('new_pw').value;
            if (USER_DATABASE[id]) {
                PASSWORDS[id] = npw;
                alert("Kata laluan berjaya dikemaskini!");
                toggleReset(false);
            } else { alert("ID tidak sah!"); }
        }

        // --- 3. GEOMETRY FUNCTIONS ---
        function formatToDMS(deg) {
            let d = Math.floor(deg);
            let minFloat = (deg - d) * 60;
            let m = Math.floor(minFloat);
            let s = Math.round((minFloat - m) * 60);
            return `${d}°${m}'${s}"`;
        }

        function convertCoords() {
            const val = parseFloat(document.getElementById('latInput').value);
            if (!isNaN(val)) {
                document.getElementById('dmsResult').innerText = "Hasil: " + formatToDMS(val);
            }
        }

        // --- 4. MAP INITIALIZATION ---
        function initMap() {
            map = L.map('map').setView([2.1036, 102.5226], 18);

            googleSat = L.tileLayer('https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', { attribution: 'Google' });
            osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png');

            googleSat.addTo(map);

            // Load Lot Layer
            layer_LOTFINAL_2 = L.geoJson(json_LOTFINAL_2, {
                style: function() {
                    return { color: document.getElementById('colorBorder').value, weight: document.getElementById('widthLine').value, fillOpacity: 0.3 };
                },
                onEachFeature: function(feature, layer) {
                    // Create Labels
                    if (feature.properties['NO_LOT']) {
                        layer.bindTooltip("LOT " + feature.properties['NO_LOT'], {
                            permanent: true, direction: 'center', className: 'custom-lot-label'
                        });
                    }
                    
                    // Click Event
                    layer.on('click', function(e) {
                        showDetails(feature.properties);
                        map.fitBounds(layer.getBounds());
                    });
                }
            }).addTo(map);
        }

        // --- 5. UI INTERACTION ---
        function showDetails(p) {
            const panel = document.getElementById('infoPanel');
            const content = document.getElementById('infoContent');
            panel.style.display = 'block';
            content.innerHTML = `
                <table class="info-table">
                    <tr><td class="label-bold">NO LOT</td><td>: ${p['NO_LOT'] || '-'}</td></tr>
                    <tr><td class="label-bold">PEMILIK</td><td>: ${p['PEMILIK'] || 'N/A'}</td></tr>
                    <tr><td class="label-bold">KELUASAN</td><td>: ${p['AREA'] || '-'} m²</td></tr>
                    <tr><td class="label-bold">DAERAH</td><td>: ${p['DAERAH'] || '-'}</td></tr>
                </table>
            `;
        }

        function toggleBasemap() {
            if (document.getElementById('checkSat').checked) {
                map.removeLayer(osm); googleSat.addTo(map);
            } else {
                map.removeLayer(googleSat); osm.addTo(map);
            }
        }

        function toggleLabels() {
            const show = document.getElementById('checkLabel').checked;
            layer_LOTFINAL_2.eachLayer(l => {
                if (!show) l.unbindTooltip();
                else l.bindTooltip("LOT " + l.feature.properties['NO_LOT'], { permanent: true, direction: 'center', className: 'custom-lot-label' });
            });
        }

        function updateStyles() {
            const c = document.getElementById('colorBorder').value;
            const w = document.getElementById('widthLine').value;
            layer_LOTFINAL_2.setStyle({ color: c, weight: w });
        }
    </script>
</body>
</html>
