<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
        <meta name="mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <link rel="stylesheet" href="css/leaflet.css">
        <link rel="stylesheet" href="css/L.Control.Layers.Tree.css">
        <link rel="stylesheet" href="css/qgis2web.css">
        <link rel="stylesheet" href="css/fontawesome-all.min.css">
        <link rel="stylesheet" href="css/leaflet-search.css">
        <link rel="stylesheet" href="css/leaflet.photon.css">
        <style>
        html, body {
            width: 100%;
            height: 100%;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
        }
        
        #title-header {
            background-color: #ffffff;
            color: #333;
            text-align: center;
            padding: 10px 0;
            margin: 0;
            font-family: Arial, sans-serif;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            z-index: 1000;
        }

        #map {
            width: 100%;
            flex-grow: 1;
            padding: 0;
            margin: 0;
        }
        </style>
        <title>TAMAN PERUMAHAN</title>
    </head>
    <body>
        <h1 id="title-header">TAMAN PERUMAHAN</h1>

        <div id="map">
        </div>
        
        <script src="js/qgis2web_expressions.js"></script>
        <script src="js/leaflet.js"></script>
        <script src="js/L.Control.Layers.Tree.min.js"></script>
        <script src="js/leaflet.rotatedMarker.js"></script>
        <script src="js/leaflet.pattern.js"></script>
        <script src="js/leaflet-hash.js"></script>
        <script src="js/Autolinker.min.js"></script>
        <script src="js/rbush.min.js"></script>
        <script src="js/labelgun.min.js"></script>
        <script src="js/labels.js"></script>
        <script src="js/leaflet.photon.js"></script>
        <script src="js/leaflet-search.js"></script>
        <script src="data/POLYGONIZEE_1.js"></script>
        <script src="data/LOTFINAL_2.js"></script>
        <script src="data/TANDASEMPADAN_3.js"></script>
        <script>
        var highlightLayer;
        function highlightFeature(e) {
            highlightLayer = e.target;
            if (e.target.openPopup) {
                e.target.openPopup();
            }
        }
        var map = L.map('map', {
            zoomControl:false, maxZoom:28, minZoom:1
        }).fitBounds([[2.1022779341308064,102.52037699699693],[2.1050033227290808,102.52490225827017]]);
        var hash = new L.Hash(map);
        map.attributionControl.setPrefix('<a href="https://github.com/tomchadwin/qgis2web" target="_blank">qgis2web</a> &middot; <a href="https://leafletjs.com" title="A JS library for interactive maps">Leaflet</a> &middot; <a href="https://qgis.org">QGIS</a>');
        var autolinker = new Autolinker({truncate: {length: 30, location: 'smart'}});
        
        function removeEmptyRowsFromPopupContent(content, feature) {
         var tempDiv = document.createElement('div');
         tempDiv.innerHTML = content;
         var rows = tempDiv.querySelectorAll('tr');
         for (var i = 0; i < rows.length; i++) {
             var td = rows[i].querySelector('td.visible-with-data');
             var key = td ? td.id : '';
             if (td && td.classList.contains('visible-with-data') && feature.properties[key] == null) {
                 rows[i].parentNode.removeChild(rows[i]);
             }
         }
         return tempDiv.innerHTML;
        }

        function addClassToPopupIfMedia(content, popup) {
            var tempDiv = document.createElement('div');
            tempDiv.innerHTML = content;
            var imgTd = tempDiv.querySelector('td img');
            if (imgTd) {
                var src = imgTd.getAttribute('src');
                if (/\.(jpg|jpeg|png|gif|bmp|webp|avif)$/i.test(src)) {
                    popup._contentNode.classList.add('media');
                    setTimeout(function() { popup.update(); }, 10);
                }
            }
        }

        var zoomControl = L.control.zoom({ position: 'topleft' }).addTo(map);
        var bounds_group = new L.featureGroup([]);

        map.createPane('pane_GoogleSatellite_0');
        map.getPane('pane_GoogleSatellite_0').style.zIndex = 400;
        var layer_GoogleSatellite_0 = L.tileLayer('https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', {
            pane: 'pane_GoogleSatellite_0',
            opacity: 1.0,
            minZoom: 1,
            maxZoom: 28
        });
        map.addLayer(layer_GoogleSatellite_0);

        // --- LAYER POLYGONIZEE ---
        function pop_POLYGONIZEE_1(feature, layer) {
            layer.on({
                mouseover: highlightFeature,
            });
            var popupContent = '<table>\
                    <tr><td colspan="2">' + (feature.properties['FID'] !== null ? autolinker.link(String(feature.properties['FID'])) : '') + '</td>\
                    </tr><tr><td colspan="2">' + (feature.properties['NO_LOT'] !== null ? autolinker.link(String(feature.properties['NO_LOT'])) : '') + '</td>\
                    </tr><tr><td colspan="2">' + (feature.properties['AREA'] !== null ? autolinker.link(String(feature.properties['AREA'])) : '') + '</td></tr>\
                </table>';
            layer.bindPopup(popupContent, { maxHeight: 400 });
        }

        function style_POLYGONIZEE_1_0() {
            return {
                pane: 'pane_POLYGONIZEE_1',
                opacity: 1,
                color: 'rgba(35,35,35,1.0)',
                weight: 1.0, 
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(225,89,137,1.0)',
                interactive: true,
            }
        }
        map.createPane('pane_POLYGONIZEE_1');
        map.getPane('pane_POLYGONIZEE_1').style.zIndex = 401;
        var layer_POLYGONIZEE_1 = new L.geoJson(json_POLYGONIZEE_1, {
            pane: 'pane_POLYGONIZEE_1',
            onEachFeature: pop_POLYGONIZEE_1,
            style: style_POLYGONIZEE_1_0,
        });
        bounds_group.addLayer(layer_POLYGONIZEE_1);
        map.addLayer(layer_POLYGONIZEE_1);

        // --- LAYER LOTFINAL (TARGET CARIAN) ---
        function pop_LOTFINAL_2(feature, layer) {
            layer.on({
                mouseover: highlightFeature,
            });
            var popupContent = '<table>\
                    <tr><td colspan="2"><strong>FID:</strong> ' + (feature.properties['FID'] !== null ? autolinker.link(String(feature.properties['FID'])) : '') + '</td></tr>\
                    <tr><td colspan="2"><strong>NO LOT:</strong> ' + (feature.properties['NO_LOT'] !== null ? autolinker.link(String(feature.properties['NO_LOT'])) : '') + '</td></tr>\
                    <tr><td colspan="2"><strong>KELUASAN:</strong> ' + (feature.properties['AREA'] !== null ? autolinker.link(String(feature.properties['AREA'])) : '') + '</td></tr>\
                </table>';
            layer.bindPopup(popupContent, { maxHeight: 400 });
        }

        function style_LOTFINAL_2_0() {
            return {
                pane: 'pane_LOTFINAL_2',
                opacity: 1,
                color: 'rgba(35,35,35,1.0)',
                weight: 1.0, 
                fill: true,
                fillOpacity: 0.6,
                fillColor: 'rgba(152,125,183,1.0)',
                interactive: true,
            }
        }
        map.createPane('pane_LOTFINAL_2');
        map.getPane('pane_LOTFINAL_2').style.zIndex = 402;
        var layer_LOTFINAL_2 = new L.geoJson(json_LOTFINAL_2, {
            pane: 'pane_LOTFINAL_2',
            onEachFeature: pop_LOTFINAL_2,
            style: style_LOTFINAL_2_0,
        });
        bounds_group.addLayer(layer_LOTFINAL_2);
        map.addLayer(layer_LOTFINAL_2);

        // --- LAYER TANDA SEMPADAN ---
        function pop_TANDASEMPADAN_3(feature, layer) {
            var popupContent = '<table>\
                    <tr><td colspan="2">ID: ' + (feature.properties['FID'] !== null ? autolinker.link(String(feature.properties['FID'])) : '') + '</td></tr>\
                </table>';
            layer.bindPopup(popupContent, { maxHeight: 400 });
        }

        map.createPane('pane_TANDASEMPADAN_3');
        map.getPane('pane_TANDASEMPADAN_3').style.zIndex = 403;
        var layer_TANDASEMPADAN_3 = new L.geoJson(json_TANDASEMPADAN_3, {
            pane: 'pane_TANDASEMPADAN_3',
            onEachFeature: pop_TANDASEMPADAN_3,
            pointToLayer: function (feature, latlng) {
                return L.circleMarker(latlng, {
                    radius: 4.0,
                    fillColor: 'rgba(183,72,75,1.0)',
                    color: '#000',
                    weight: 1,
                    fillOpacity: 1
                });
            },
        });
        bounds_group.addLayer(layer_TANDASEMPADAN_3);
        map.addLayer(layer_TANDASEMPADAN_3);

        // --- FUNGSI CARIAN, AUTO ZOOM & AUTO POPUP ---
        var searchControl = new L.Control.Search({
            layer: layer_LOTFINAL_2,
            initial: false,
            hideMarkerOnCollapse: true,
            propertyName: 'NO_LOT',
            moveToLocation: function(latlng, title, map) {
                // Auto Zoom ke bounds lot tersebut
                var zoom = map.getBoundsZoom(latlng.layer.getBounds());
                map.setView(latlng, zoom);
            }
        });

        searchControl.on('search:locationfound', function(e) {
            // Auto Popup maklumat lot
            if(e.layer._popup) {
                e.layer.openPopup();
            }
        });

        map.addControl(searchControl);

        // Icon Binoculars
        if (document.getElementsByClassName('search-button').length > 0) {
            var btnIndex = document.getElementsByClassName('search-button').length - 1;
            document.getElementsByClassName('search-button')[btnIndex].className += ' fa fa-binoculars';
        }

        resetLabels([layer_POLYGONIZEE_1,layer_TANDASEMPADAN_3]);
        map.on("zoomend", function(){ resetLabels([layer_POLYGONIZEE_1,layer_TANDASEMPADAN_3]); });
        </script>        
    </body>
</html>
