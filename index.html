<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
        <meta name="mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <link rel="stylesheet" href="css/leaflet.css">
        <link rel="stylesheet" href="css/L.Control.Layers.Tree.css">
        <link rel="stylesheet" href="css/qgis2web.css">
        <link rel="stylesheet" href="css/fontawesome-all.min.css">
        <link rel="stylesheet" href="css/leaflet-search.css">
        <link rel="stylesheet" href="css/leaflet.photon.css">
        <style>
            /* Layout & Header */
            html, body {
                width: 100%;
                height: 100%;
                padding: 0;
                margin: 0;
                display: flex;
                flex-direction: column;
                font-family: Arial, sans-serif;
            }
            
            #title-header {
                background-color: #ffffff;
                color: #333;
                text-align: center;
                padding: 10px 0;
                margin: 0;
                box-shadow: 0 2px 5px rgba(0,0,0,0.1);
                z-index: 1000;
            }

            #map {
                width: 100%;
                flex-grow: 1;
                margin: 0;
                padding: 0;
            }

            /* Log In UI Overlay */
            #login-overlay {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0, 0, 0, 0.95);
                display: flex;
                justify-content: center;
                align-items: center;
                z-index: 10000; /* Melebihi semua elemen lain */
            }
            .login-box {
                background: white;
                padding: 40px;
                border-radius: 15px;
                text-align: center;
                box-shadow: 0 10px 25px rgba(0,0,0,0.5);
                width: 320px;
            }
            .login-box h2 { margin-bottom: 20px; color: #2c3e50; font-size: 22px; }
            .login-box input {
                display: block;
                margin: 15px auto;
                padding: 12px;
                width: 100%;
                border: 1px solid #ddd;
                border-radius: 8px;
                box-sizing: border-box;
            }
            .login-box button {
                width: 100%;
                padding: 12px;
                background: #27ae60;
                color: white;
                border: none;
                cursor: pointer;
                border-radius: 8px;
                font-weight: bold;
                font-size: 16px;
                transition: 0.3s;
            }
            .login-box button:hover { background: #219150; }
            #login-error { color: #e74c3c; font-size: 14px; margin-top: 15px; display: none; }
        </style>
        <title>TAMAN PERUMAHAN</title>
    </head>
    <body>
        <div id="login-overlay">
            <div class="login-box">
                <i class="fas fa-user-lock fa-3x" style="color: #2c3e50; margin-bottom: 15px;"></i>
                <h2>PENGESAHAN PENGGUNA</h2>
                <input type="text" id="userid" placeholder="ID Pengguna">
                <input type="password" id="password" placeholder="Kata Laluan">
                <button onclick="checkLogin()">LOG MASUK</button>
                <p id="login-error">ID atau Kata Laluan Salah!</p>
            </div>
        </div>

        <h1 id="title-header">SISTEM MAKLUMAT LOT TAMAN PERUMAHAN</h1>

        <div id="map"></div>
        
        <script src="js/qgis2web_expressions.js"></script>
        <script src="js/leaflet.js"></script>
        <script src="js/L.Control.Layers.Tree.min.js"></script>
        <script src="js/leaflet.rotatedMarker.js"></script>
        <script src="js/leaflet.pattern.js"></script>
        <script src="js/leaflet-hash.js"></script>
        <script src="js/Autolinker.min.js"></script>
        <script src="js/rbush.min.js"></script>
        <script src="js/labelgun.min.js"></script>
        <script src="js/labels.js"></script>
        <script src="js/leaflet.photon.js"></script>
        <script src="js/leaflet-search.js"></script>
        
        <script src="data/POLYGONIZEE_1.js"></script>
        <script src="data/LOTFINAL_2.js"></script>
        <script src="data/TANDASEMPADAN_3.js"></script>

        <script>
        /* FUNGSI LOG IN */
        function checkLogin() {
            var id = document.getElementById('userid').value;
            var pass = document.getElementById('password').value;
            
            // Log In Settings (Ubah ID/Password di sini)
            if(id === "admin" && pass === "1234") {
                document.getElementById('login-overlay').style.display = 'none';
            } else {
                document.getElementById('login-error').style.display = 'block';
            }
        }

        var highlightLayer;
        function highlightFeature(e) {
            highlightLayer = e.target;
            highlightLayer.openPopup();
        }

        var map = L.map('map', {
            zoomControl:false, maxZoom:28, minZoom:1
        }).fitBounds([[2.1022779341308064,102.52037699699693],[2.1050033227290808,102.52490225827017]]);
        
        var hash = new L.Hash(map);
        map.attributionControl.setPrefix('<a href="https://github.com/tomchadwin/qgis2web" target="_blank">qgis2web</a>');
        var autolinker = new Autolinker({truncate: {length: 30, location: 'smart'}});

        // Basemap
        map.createPane('pane_GoogleSatellite_0');
        map.getPane('pane_GoogleSatellite_0').style.zIndex = 400;
        var layer_GoogleSatellite_0 = L.tileLayer('https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', {
            pane: 'pane_GoogleSatellite_0',
            opacity: 1.0,
            attribution: 'Google Satellite',
            minZoom: 1,
            maxZoom: 28,
        });
        map.addLayer(layer_GoogleSatellite_0);

        // Fungsi Popup & Pengindeksan Carian (Search Indexing)
        function pop_LOTFINAL_2(feature, layer) {
            layer.on({
                mouseout: function(e) { if (typeof layer.closePopup == 'function') { layer.closePopup(); } },
                mouseover: highlightFeature,
            });

            /* 1. Kumpulkan Data (Gunakan fallback jika nama property berbeza) */
            var lot = feature.properties['NO_LOT'] || '-';
            var pemilik = feature.properties['tsp — pe'] || feature.properties['PEMILIK'] || '-';
            var keluasan = feature.properties['tsp — ha'] || feature.properties['AREA'] || '-';
            var daerah = feature.properties['DAERAH'] || 'DAERAH';

            /* 2. Bina Search Index (Gabungkan semua kriteria ke satu string) */
            feature.properties['search_idx'] = (daerah + " " + pemilik + " " + lot + " " + keluasan).toUpperCase();

            /* 3. Bina Popup */
            var popupContent = '<table class="popup-table">\
                    <tr><th style="text-align:left; padding-right:10px;">DAERAH</th><td>' + daerah + '</td></tr>\
                    <tr><th style="text-align:left; padding-right:10px;">PEMILIK</th><td>' + pemilik + '</td></tr>\
                    <tr><th style="text-align:left; padding-right:10px;">NO LOT</th><td>' + lot + '</td></tr>\
                    <tr><th style="text-align:left; padding-right:10px;">LUAS</th><td>' + keluasan + '</td></tr>\
                </table>';
            layer.bindPopup(popupContent, { maxHeight: 400 });
        }

        // Layer Lot Final
        var layer_LOTFINAL_2 = new L.geoJson(json_LOTFINAL_2, {
            pane: 'pane_LOTFINAL_2',
            onEachFeature: pop_LOTFINAL_2,
            style: {
                color: 'rgba(35,35,35,1.0)',
                fillColor: 'rgba(152,125,183,1.0)',
                fillOpacity: 0.7,
                weight: 1.5
            }
        });
        map.addLayer(layer_LOTFINAL_2);

        // Konfigurasi Search Tab (Multi-Kriteria)
        var searchControl = new L.Control.Search({
            layer: layer_LOTFINAL_2,
            propertyName: 'search_idx', // Cari dalam gabungan data tadi
            initial: false,
            hideMarkerOnCollapse: true,
            textPlaceholder: 'Cari Daerah / Pemilik / No Lot / Luas...',
            moveToLocation: function(latlng, title, map) {
                map.setView(latlng, 20); // Zoom ke lot yang dijumpai
            }
        });
        map.addControl(searchControl);

        // Zoom Control Asal
        L.control.zoom({ position: 'topleft' }).addTo(map);

        // Pasang Binoculars Icon
        if (document.querySelector('.search-button')) {
            document.querySelector('.search-button').className += ' fa fa-binoculars';
        }

        </script>        
    </body>
</html>
