<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
        <link rel="stylesheet" href="css/leaflet.css">
        <link rel="stylesheet" href="css/L.Control.Layers.Tree.css">
        <link rel="stylesheet" href="css/qgis2web.css">
        <link rel="stylesheet" href="css/fontawesome-all.min.css">
        <link rel="stylesheet" href="css/leaflet-search.css">
        <style>
        html, body {
            width: 100%; height: 100%; padding: 0; margin: 0;
            display: flex; flex-direction: column;
        }
        #title-header {
            background-color: #ffffff; text-align: center; padding: 10px 0;
            margin: 0; font-family: Arial, sans-serif; box-shadow: 0 2px 5px rgba(0,0,0,0.1); z-index: 1000;
        }
        #map { width: 100%; flex-grow: 1; margin: 0; }

        /* --- GAYA TAB UNTUK LAYER CONTROL --- */
        .leaflet-control-layers {
            border: none !important;
            box-shadow: 0 1px 5px rgba(0,0,0,0.4) !important;
            border-radius: 5px !important;
        }
        .leaflet-control-layers-expanded {
            padding: 0 !important;
            overflow: hidden;
        }
        .layer-tab-header {
            background: #2c3e50;
            color: white;
            padding: 8px 15px;
            font-weight: bold;
            font-family: sans-serif;
            font-size: 12px;
            text-transform: uppercase;
        }
        .leaflet-control-layers-list {
            padding: 10px;
            background: #f8f9fa;
        }
        </style>
        <title>TAMAN PERUMAHAN</title>
    </head>
    <body>
        <h1 id="title-header">TAMAN PERUMAHAN</h1>
        <div id="map"></div>
        
        <script src="js/qgis2web_expressions.js"></script>
        <script src="js/leaflet.js"></script>
        <script src="js/L.Control.Layers.Tree.min.js"></script>
        <script src="js/leaflet-hash.js"></script>
        <script src="js/Autolinker.min.js"></script>
        <script src="js/leaflet-search.js"></script>
        <script src="data/POLYGONIZEE_1.js"></script>
        <script src="data/LOTFINAL_2.js"></script>
        <script src="data/TANDASEMPADAN_3.js"></script>

        <script>
        var map = L.map('map', {
            zoomControl:true, maxZoom:28, minZoom:1
        }).fitBounds([[2.1022779341308064,102.52037699699693],[2.1050033227290808,102.52490225827017]]);

        // Base Layer
        var layer_GoogleSatellite_0 = L.tileLayer('https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', {
            opacity: 1.0, attribution: 'Google Satellite'
        }).addTo(map);

        // Layer 1: POLYGONIZEE
        var layer_POLYGONIZEE_1 = new L.geoJson(json_POLYGONIZEE_1, {
            style: { color: 'rgba(225,89,137,1.0)', fillOpacity: 1 }
        }).addTo(map);

        // Layer 2: LOTFINAL (Target Carian)
        var layer_LOTFINAL_2 = new L.geoJson(json_LOTFINAL_2, {
            style: { color: 'rgba(152,125,183,1.0)', fillOpacity: 0.6 },
            onEachFeature: function(feature, layer) {
                var popupContent = '<b>NO LOT:</b> ' + feature.properties['NO_LOT'] + '<br><b>AREA:</b> ' + feature.properties['AREA'];
                layer.bindPopup(popupContent);
            }
        }).addTo(map);

        // Layer 3: TANDA SEMPADAN
        var layer_TANDASEMPADAN_3 = new L.geoJson(json_TANDASEMPADAN_3, {
            pointToLayer: function (feature, latlng) {
                return L.circleMarker(latlng, { radius: 4, fillColor: "#b7484b", color: "#000", weight: 1, fillOpacity: 1 });
            }
        }).addTo(map);

        // --- MENUKAR LAYER CONTROL KEPADA TAB ---
        var baseMaps = { "Google Satellite": layer_GoogleSatellite_0 };
        var overlayMaps = {
            "Sempadan Lot": layer_LOTFINAL_2,
            "Kawasan Polygon": layer_POLYGONIZEE_1,
            "Tanda Sempadan": layer_TANDASEMPADAN_3
        };

        var layerControl = L.control.layers(baseMaps, overlayMaps, {
            collapsed: false, // Kekal terbuka supaya nampak seperti tab/panel
            position: 'topright'
        }).addTo(map);

        // Tambah header tajuk pada Tab Layer
        var container = layerControl.getContainer();
        var header = document.createElement('div');
        header.className = 'layer-tab-header';
        header.innerHTML = '<i class="fa fa-layer-group"></i> Senarai Lapisan';
        container.insertBefore(header, container.firstChild);

        // --- FUNGSI CARIAN & AUTO ZOOM ---
        var searchControl = new L.Control.Search({
            layer: layer_LOTFINAL_2,
            initial: false,
            propertyName: 'NO_LOT',
            moveToLocation: function(latlng, title, map) {
                var zoom = map.getBoundsZoom(latlng.layer.getBounds());
                map.setView(latlng, zoom);
            }
        });

        searchControl.on('search:locationfound', function(e) {
            if(e.layer._popup) e.layer.openPopup();
        });

        map.addControl(searchControl);
        </script>
    </body>
</html>
